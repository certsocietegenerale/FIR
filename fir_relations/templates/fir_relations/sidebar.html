{% load i18n %}
{% if relations %}
  <div class="widget">
    <h4 class="widget">{{ title }}</h4>
    <table class="table table-condensed files fixed">
      <thead>
        <tr>
          <th class="date-column">{% trans "ID" %}</th>
          <th>{% trans "Type" %}</th>
          <th>{% trans "Subject" %}</th>
          <th class="icon-column"></th>
        </tr>
      </thead>
      {% for relation in relations %}
        <tr id="relation_id_{{ relation.relation.id }}">
          <td>{{ relation.id_text }}</td>
          <td>{{ relation.object_type }}</td>
          <td>
            <a href="{% url relation.url relation.id %}">
              {{ relation }}
            </a>
          </td>
          <td class="icon-column">
            {% if relation.can_edit %}
	      <button type="submit" class="btn btn-sm btn-link icon detach-relation" data-relation="{{ relation.relation.id }}">
                <i class="bi bi-x-circle"></i>
              </button>
            {% endif %}
          </td>
        </tr>
      {% endfor %}
    </table>
  </div>
{% endif %}
